name: Installer Smoke Test

on:
  schedule:
    - cron: '7 9 * * 1'  # Weekly Monday 09:07 UTC
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: bash scripts/build-installer.sh 1.0.6-test

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-smoke-${{ github.sha }}
          path: installer/build/*.exe

      - name: Silent install
        shell: cmd
        run: |
          installer\build\EnglishOralTeacher-Setup-v1.0.6-test.exe /VERYSILENT /SUPPRESSMSGBOXES /LOG=%TEMP%\install.log
          type %TEMP%\install.log

      - name: Wait for server startup
        shell: cmd
        run: timeout /t 5 /nobreak > nul

      - name: Health check
        shell: cmd
        run: |
          curl -sf http://localhost:8787/api/health
          if %ERRORLEVEL% NEQ 0 (
            echo "Health check failed"
            type "%APPDATA%\EnglishOralTeacher\logs\*.log" 2>nul || echo "No logs"
            exit /b 1
          )

      - name: Uninstall
        shell: cmd
        run: |
          "%ProgramFiles%\EnglishOralTeacher\unins000.exe" /VERYSILENT /SUPPRESSMSGBOXES
          timeout /t 3 /nobreak > nul

      - name: Verify uninstall
        shell: cmd
        run: |
          if exist "%ProgramFiles%\EnglishOralTeacher" (
            echo "Uninstall failed: install dir still exists"
            exit /b 1
          )
          echo "Uninstall clean"
